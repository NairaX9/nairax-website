<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — NairaX</title>
<link rel="stylesheet" href="css/style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="auth-body">

<div class="auth-container">
  <a href="index.html" class="logo auth-logo">Naira<span>X</span></a>
  <div class="auth-card">
    <h2>Reset your password</h2>
    <p class="auth-sub">Enter your email and we'll send you a reset link</p>

    <div id="authMessage" class="auth-message hidden"></div>

    <form id="resetForm">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="resetEmail" placeholder="you@example.com" required/>
      </div>
      <button type="submit" class="btn-primary btn-full" id="resetBtn">Send Reset Link</button>
    </form>

    <p class="auth-switch"><a href="login.html" class="link">← Back to login</a></p>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
