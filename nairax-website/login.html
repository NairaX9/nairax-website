<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — NairaX</title>
<link rel="stylesheet" href="css/style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="auth-body">

<div class="auth-container">
  <a href="index.html" class="logo auth-logo">Naira<span>X</span></a>
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="auth-sub">Log in to your NairaX account</p>

    <div id="authMessage" class="auth-message hidden"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Your password" required/>
      </div>
      <div class="form-footer-row">
        <label class="checkbox-label"><input type="checkbox"/> Remember me</label>
        <a href="reset.html" class="link">Forgot password?</a>
      </div>
      <button type="submit" class="btn-primary btn-full" id="loginBtn">Log In</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="signup.html" class="link">Sign up free</a></p>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
